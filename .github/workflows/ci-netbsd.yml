name: CI tests NetBSD

on:
  push:
    branches:
      - master
    paths:
      - 'test/*'
      - 'tools/test-stack-dump.sh'
      - '.github/workflows/ci-netbsd.yml'
  pull_request:
    branches:
      - master
    paths:
      - 'test/*'
      - 'tools/test-stack-dump.sh'
      - '.github/workflows/ci-netbsd.yml'
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  netbsd-tests:
    timeout-minutes: ${{ github.event_name == 'schedule' && 60 || 10 }}
    runs-on: ubuntu-latest
    name: "NetBSD tests"
    env:
      KQUEUE_DEBUG: yes
    steps:
    - uses: actions/checkout@v5
      with:
        path: libkqueue

    - name: libkqueue test suite
      uses: vmactions/netbsd-vm@v1
      with:
        usesh: true
        sync: sshfs
        prepare: |
          /usr/sbin/pkg_add cmake gdb
        envs: 'KQUEUE_DEBUG GITHUB_STEP_SUMMARY'
        run: |
          uname -sr
          cd libkqueue/test
          cmake .
          make
          GATED=$(./libkqueue-test --list-gated=netbsd 2>/dev/null) || true
          {
            printf '## Gated on netbsd\n'
            printf '| Suite | Test | Reason |\n| --- | --- | --- |\n'
            if [ -n "$GATED" ]; then
              printf '%s\n' "$GATED" | awk -F'\t' '{gsub(/\|/,"&#124;",$3); print "| "$1" | "$2" | "$3" |"}'
            else
              printf '_none_\n'
            fi
          } >> "$GITHUB_STEP_SUMMARY"
          ./libkqueue-test \
            --watchdog-timeout=120 \
            --watchdog-cmd=../tools/test-stack-dump.sh \
            -n ${{ github.event_name == 'schedule' && 50 || 1 }}
