name: CI tests FreeBSD

on:
  push:
    branches:
      - master
    paths:
      - 'test/*'
      - 'tools/test-stack-dump.sh'
      - '.github/workflows/ci-freebsd.yml'
  pull_request:
    branches:
      - master
    paths:
      - 'test/*'
      - 'tools/test-stack-dump.sh'
      - '.github/workflows/ci-freebsd.yml'
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  freebsd-tests:
# virtualbox takes a long time to start
    timeout-minutes: ${{ github.event_name == 'schedule' && 60 || 10 }}
    runs-on: ubuntu-latest
    name: "FreeBSD tests"
    env:
      KQUEUE_DEBUG: yes
    steps:
    - uses: actions/checkout@v5
      with:
        path: libkqueue

    - name: libkqueue test suite
      uses: vmactions/freebsd-vm@v1
      with:
        usesh: true
        sync: sshfs
        prepare: |
          pkg install -y cmake llvm gdb
        envs: 'KQUEUE_DEBUG'
        run: |
          freebsd-version
          cd libkqueue/test
          cmake .
          make
          ./libkqueue-test \
            --watchdog-timeout=120 \
            --watchdog-cmd=../tools/test-stack-dump.sh \
            -n ${{ github.event_name == 'schedule' && 50 || 1 }}
