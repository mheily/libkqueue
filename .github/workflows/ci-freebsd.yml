name: CI tests FreeBSD

on:
  push:
    branches:
      - master
    paths:
      - 'test/*'
      - '.github/workflows/ci-freebsd.yml'
  pull_request:
    branches:
      - master
    paths:
      - 'test/*'
      - '.github/workflows/ci-freebsd.yml'

jobs:
  freebsd-tests:
# virtualbox takes a long time to start
    timeout-minutes: 10
    runs-on: ubuntu-latest
    name: "FreeBSD tests"
    env:
      KQUEUE_DEBUG: yes
    steps:
    - uses: actions/checkout@v5
      with:
        path: libkqueue

    - name: libkqueue test suite
      uses: vmactions/freebsd-vm@v1
      with:
        usesh: true
        sync: sshfs
        prepare: |
          pkg install -y cmake llvm
        envs: 'KQUEUE_DEBUG'
        run: |
          freebsd-version
          cd libkqueue/test
          cmake .
          make
          ./libkqueue-test -n 5
