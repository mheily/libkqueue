name: CI Windows Coverity

on:
  push:
    branches:
      - master
    paths:
      - 'src/windows/*'
      - '.github/workflows/ci-windows-coverity.yml'
  workflow_dispatch:

jobs:
  windows-coverity:
    if: github.repository == 'mheily/libkqueue'
    timeout-minutes: 20
    runs-on: windows-2022
    name: "ci-windows-coverity"
    steps:
    - uses: actions/checkout@v5

    # Coverity's download endpoint 404s when the project is unpublished or
    # the token is missing/rotated.  Treat that as "scan unavailable" and
    # skip the rest of the job (it stays green) instead of failing the run.
    - name: Download coverity tool MD5
      id: coverity-md5
      shell: pwsh
      run: |
        $project = [uri]::EscapeDataString($env:GITHUB_REPOSITORY)
        try {
          Invoke-WebRequest `
            -Uri "https://scan.coverity.com/download/win64" `
            -Method Post `
            -ContentType "application/x-www-form-urlencoded" `
            -Body "token=$($env:TOKEN)&project=$project&md5=1" `
            -OutFile coverity_tool.zip.md5
        } catch {
          $ok = $false
        }
        if ((Test-Path coverity_tool.zip.md5) -and (Get-Item coverity_tool.zip.md5).Length -gt 0) {
          "available=true" | Out-File -Append -Encoding utf8 $env:GITHUB_OUTPUT
        } else {
          "available=false" | Out-File -Append -Encoding utf8 $env:GITHUB_OUTPUT
          Write-Output "::warning::Coverity tool download failed; skipping scan"
        }
      env:
        TOKEN: ${{ secrets.COVERITY_SCAN_TOKEN }}

    - name: Cache coverity tool
      if: ${{ steps.coverity-md5.outputs.available == 'true' }}
      uses: actions/cache@v4
      id: cache-coverity
      with:
        path: coverity_tool.zip
        key: coverity-tool-win64-${{ hashFiles('coverity_tool.zip.md5') }}

    - name: Download coverity tool
      if: ${{ steps.coverity-md5.outputs.available == 'true' && steps.cache-coverity.outputs.cache-hit != 'true' }}
      shell: pwsh
      run: |
        $project = [uri]::EscapeDataString($env:GITHUB_REPOSITORY)
        Invoke-WebRequest `
          -Uri "https://scan.coverity.com/download/win64" `
          -Method Post `
          -ContentType "application/x-www-form-urlencoded" `
          -Body "token=$($env:TOKEN)&project=$project" `
          -OutFile coverity_tool.zip
      env:
        TOKEN: ${{ secrets.COVERITY_SCAN_TOKEN }}

    - name: Extract coverity tool
      if: ${{ steps.coverity-md5.outputs.available == 'true' }}
      shell: pwsh
      run: |
        Expand-Archive -Path coverity_tool.zip -DestinationPath coverity_tool_stage
        $inner = Get-ChildItem -Path coverity_tool_stage -Directory | Select-Object -First 1
        Move-Item -Path $inner.FullName -Destination coverity_tool

    - name: Configure build system
      if: ${{ steps.coverity-md5.outputs.available == 'true' }}
      shell: pwsh
      run: |
        cmake -S . -B build_x64 -A x64 -G "Visual Studio 17 2022" `
          -DSTATICLIB=ON `
          -DCMAKE_BUILD_TYPE=Debug `
          -DCMAKE_VERBOSE_MAKEFILE=ON

    - name: Build with coverity
      if: ${{ steps.coverity-md5.outputs.available == 'true' }}
      shell: pwsh
      run: |
        $env:PATH = "$(Get-Location)\coverity_tool\bin;$env:PATH"
        cov-configure --msvc
        cov-build --dir cov-int cmake --build build_x64 --config Debug --parallel 1

    - name: Display build result
      if: ${{ steps.coverity-md5.outputs.available == 'true' }}
      shell: pwsh
      run: |
        Get-Content cov-int\build-log.txt

    - name: Submit result
      if: ${{ steps.coverity-md5.outputs.available == 'true' }}
      shell: pwsh
      run: |
        $project = [uri]::EscapeDataString($env:GITHUB_REPOSITORY)
        $version = (Select-String -Path build_x64/version.h -Pattern 'LIBKQUEUE_VERSION_STRING\s+"([^"]+)"').Matches[0].Groups[1].Value
        tar -czf cov-int.tar.gz cov-int
        curl.exe `
          --form "token=$env:TOKEN" `
          --form "email=a.cudbardb@freeradius.org" `
          --form "file=@cov-int.tar.gz" `
          --form "version=$version" `
          --form "description=$env:GITHUB_REPOSITORY" `
          "https://scan.coverity.com/builds?project=$project"
      env:
        TOKEN: ${{ secrets.COVERITY_SCAN_TOKEN }}
